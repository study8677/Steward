<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#125446" />
  <title>Steward Daily Brief Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet" />
  <!-- Add Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/ui/dashboard.css" />
</head>

<body>
  <a href="#main-content" class="skip-link">跳到主内容</a>
  <!-- Ambient background -->
  <div class="bg-mesh">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>

  <main id="main-content" class="layout">
    <header class="hero glass-panel">
      <div class="hero-content">
        <h1>Steward Brief Hub</h1>
        <p>The ambient proactive agent. Focus on decisions, leave the noise to the system.</p>
      </div>
      <div class="hero-actions">
        <span id="last-updated" class="text-sm muted">最后刷新：--</span>
        <select id="lang-switch" class="btn btn-secondary btn-sm lang-switch" aria-label="语言切换">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
        <a id="open-integrations-btn" class="btn btn-secondary" href="/dashboard/integrations">信息源管理</a>
        <button id="refresh-btn" class="btn btn-primary" type="button">立即刷新</button>
      </div>
    </header>

    <section class="kpis" id="kpi-cards" aria-live="polite"></section>

    <!-- Prioritize Actionable Items -->
    <section class="grid items-priority">
      <!-- 核心决策区：待确认与冲突 -->
      <article class="card highlight-card">
        <div class="card-header">
          <h2 id="pending-title">待确认计划</h2>
          <span class="badge" id="pending-badge">0</span>
        </div>
        <div id="pending-list" class="list" aria-live="polite"></div>
      </article>

      <article class="card highlight-card">
        <div class="card-header">
          <h2 id="conflict-title">冲突工单</h2>
          <span class="badge danger-badge" id="conflict-badge">0</span>
        </div>
        <div id="conflict-list" class="list" aria-live="polite"></div>
      </article>
    </section>

    <!-- Information & Context -->
    <section class="grid items-context">
      <article class="card">
        <h2 id="connectors-title">连接器健康</h2>
        <div id="connector-health" class="health-grid" aria-live="polite"></div>
      </article>

      <!-- 自然语言提交事件作为主要输入口 -->
      <article class="card quick-action">
        <h2 id="tell-title">告诉 Steward (Cmd/Ctrl + K)</h2>
        <form id="event-form">
          <label class="sr-only" for="event-input">只需要说一句你要处理的事情</label>
          <div class="input-group">
            <textarea id="event-input" name="text" rows="1" class="auto-resize"
              placeholder="描述你当前要处理的真实事项。按 Enter 提交，Shift+Enter 换行" aria-describedby="event-input-hint"
              required></textarea>
            <button type="submit" class="btn btn-primary">发送</button>
          </div>
          <p id="event-input-hint" class="input-hint text-xs muted">Enter 提交，Shift+Enter 换行。使用 Cmd/Ctrl + K 快速聚焦。</p>
        </form>
        <p id="event-result" class="status-msg" role="status" aria-live="polite">等待输入</p>
      </article>

      <article class="card brief-card">
        <div class="card-header">
          <h2 id="brief-title">最新简报</h2>
          <button id="brief-view-btn" class="btn btn-secondary btn-sm" type="button">立即查看简报</button>
        </div>
        <div class="brief-settings" id="brief-settings-panel">
          <div class="brief-settings-row">
            <label for="brief-frequency-hours" id="brief-frequency-label">频率</label>
            <select id="brief-frequency-hours">
              <option value="1">1h</option>
              <option value="2">2h</option>
              <option value="4">4h</option>
              <option value="6">6h</option>
              <option value="8">8h</option>
              <option value="12">12h</option>
              <option value="24">24h</option>
            </select>
            <label for="brief-content-level" id="brief-content-level-label">内容层级</label>
            <select id="brief-content-level">
              <option value="simple">简单</option>
              <option value="medium">中等</option>
              <option value="rich">丰富</option>
            </select>
            <button id="brief-settings-save-btn" class="btn btn-secondary btn-sm" type="button">保存</button>
          </div>
          <p id="brief-settings-status" class="status-msg" role="status" aria-live="polite">等待设置</p>
        </div>
        <div id="brief-markdown" class="brief markdown-body" aria-live="polite"></div>
      </article>

      <article class="card brief-card">
        <h2 id="logs-title">运行日志</h2>
        <div id="runtime-logs" class="list compact-list" aria-live="polite"></div>
      </article>
    </section>
  </main>

  <script src="/ui/dashboard.js" defer></script>
</body>

</html>
