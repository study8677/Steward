version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: steward-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: steward
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward -d steward"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - steward-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: steward-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  steward-postgres-data:
